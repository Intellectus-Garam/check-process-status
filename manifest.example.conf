# check-process-status manifest (template)
#
# Copy to manifest.conf on each machine and delete the lines for tests that
# are NOT running there. manifest.conf is gitignored, so per-machine edits
# survive `git pull`.
#
# Columns (whitespace-separated):
#   type    native | ffi      topology of the tmux target
#   role    pub | sub         receiving check runs on subs only
#   target  tmux target       native: session name (== binary name)
#                             ffi:    ffi:<window>.<pane>  (.0 = pub top, .1 = sub bottom)
#   label   short name shown in the report (no spaces)

# --- native long_term (start-longterm-test.sh: one session per binary) ---
native  pub  103_reliable_keyed_pub              103_reliable_keyed
native  sub  103_reliable_keyed_sub              103_reliable_keyed
native  pub  104_best_effort_keyed_pub           104_best_effort_keyed
native  sub  104_best_effort_keyed_sub           104_best_effort_keyed
native  pub  105_reliable_pub                    105_reliable
native  sub  105_reliable_sub                    105_reliable
native  pub  106_best_effort_pub                 106_best_effort
native  sub  106_best_effort_sub                 106_best_effort
native  pub  107_reliable_payload_pub            107_reliable_payload
native  sub  107_reliable_payload_sub            107_reliable_payload
native  pub  108_best_effort_payload_pub         108_best_effort_payload
native  sub  108_best_effort_payload_sub         108_best_effort_payload
